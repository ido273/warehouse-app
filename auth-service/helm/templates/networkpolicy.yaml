apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "helm.fullname" . }}-network-policy
  labels:
    {{- include "helm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "helm.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Frontend (login/registration proxy) and backend (role checks via /auth/me)
    # are the only callers of auth-service.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: warehouse-frontend
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: warehouse-backend
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
