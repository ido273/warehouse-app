services:
  frontend:
    build: ./frontend
    ports:
      - "3000:8080"
    volumes:
      - ./frontend:/app
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      SECRET_KEY: REDACTED
      AUTH_SERVICE_URL: http://auth-service:8080
    depends_on:
      auth-service:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    ports:
      - "5003:8080"
    environment:
      DATABASE_URL: mysql+pymysql://warehouse_user:REDACTED@mysql/warehouse_db
      JWT_SECRET_KEY: REDACTED
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 10s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "5001:8080"
    environment:
      DATABASE_URL: mysql+pymysql://warehouse_user:REDACTED@mysql/warehouse_db
      AUTH_SERVICE_URL: http://auth-service:8080
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      ai-tagging:
        condition: service_started
      auth-service:
        condition: service_healthy

  ai-tagging:
    build: ./ai-tagging
    ports:
      - "5002:8080"

  mysql:
    image: mysql:9.7
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: REDACTED
      MYSQL_DATABASE: warehouse_db
      MYSQL_USER: warehouse_user
      MYSQL_PASSWORD: REDACTED
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  mysql-data:
  backend_uploads: