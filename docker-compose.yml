services:
  frontend:
    build: ./frontend
    ports:
      - "3000:8080"

  backend:
    build: ./backend
    ports:
      - "5001:8080"
    environment:
      DATABASE_URL: mysql+pymysql://warehouse_user:REDACTED@mysql/warehouse_db
    depends_on:
      mysql:
        condition: service_healthy
      ai-tagging:
        condition: service_started

  ai-tagging:
    build: ./ai-tagging
    ports:
      - "5002:8080"

  mysql:
    image: mysql:9.7
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: REDACTED
      MYSQL_DATABASE: warehouse_db
      MYSQL_USER: warehouse_user
      MYSQL_PASSWORD: REDACTED
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  mysql-data: