apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
spec:
  selector:
    matchLabels:
      app: mysql
  serviceName: mysql
  replicas: 1
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:{{ .Values.image.tag }}
          ports:
            - containerPort: 3306
          resources:
            requests:
              memory: 1Gi
              cpu: 250m
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: {{ .Values.auth.rootPassword }}
            - name: MYSQL_DATABASE
              value: {{ .Values.auth.database }}
            - name: MYSQL_USER
              value: {{ .Values.auth.username }}
            - name: MYSQL_PASSWORD
              value: {{ .Values.auth.password }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-scripts
          configMap:
            name: mysql-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.primary.persistence.storageClassName | default "" }}
        resources:
          requests:
            storage: {{ .Values.primary.persistence.size }}