apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
  namespace: warehouse
data:
  init.sql: |
    -- auth-service tables
    CREATE TABLE IF NOT EXISTS users (
      id            INT AUTO_INCREMENT PRIMARY KEY,
      email         VARCHAR(255) NOT NULL UNIQUE,
      password_hash VARCHAR(255) NOT NULL,
      role          ENUM('admin','manager','contributor','viewer') NOT NULL DEFAULT 'viewer',
      first_name    VARCHAR(100),
      last_name     VARCHAR(100),
      created_at    DATETIME
    );

    CREATE TABLE IF NOT EXISTS user_locations (
      id            INT AUTO_INCREMENT PRIMARY KEY,
      user_id       INT NOT NULL,
      location_name VARCHAR(255) NOT NULL,
      access_type   ENUM('all','specific') NOT NULL DEFAULT 'specific',
      FOREIGN KEY (user_id) REFERENCES users(id)
    );

    CREATE TABLE IF NOT EXISTS workspaces (
      id          INT AUTO_INCREMENT PRIMARY KEY,
      name        VARCHAR(255) NOT NULL,
      owner_id    INT NOT NULL,
      invite_code VARCHAR(8) NOT NULL UNIQUE,
      created_at  DATETIME,
      FOREIGN KEY (owner_id) REFERENCES users(id)
    );

    CREATE TABLE IF NOT EXISTS user_workspaces (
      id           INT AUTO_INCREMENT PRIMARY KEY,
      user_id      INT NOT NULL,
      workspace_id INT NOT NULL,
      role         ENUM('admin','manager','contributor','viewer') NOT NULL DEFAULT 'viewer',
      FOREIGN KEY (user_id) REFERENCES users(id),
      FOREIGN KEY (workspace_id) REFERENCES workspaces(id)
    );

    CREATE TABLE IF NOT EXISTS workspace_invite_requests (
      id           INT AUTO_INCREMENT PRIMARY KEY,
      user_id      INT NOT NULL,
      workspace_id INT NOT NULL,
      status       ENUM('pending','approved','rejected') NOT NULL DEFAULT 'pending',
      created_at   DATETIME,
      FOREIGN KEY (user_id) REFERENCES users(id),
      FOREIGN KEY (workspace_id) REFERENCES workspaces(id)
    );

    CREATE TABLE IF NOT EXISTS workspace_locations (
      id           INT AUTO_INCREMENT PRIMARY KEY,
      name         VARCHAR(255) NOT NULL,
      workspace_id INT NOT NULL,
      created_at   DATETIME,
      FOREIGN KEY (workspace_id) REFERENCES workspaces(id),
      UNIQUE KEY uq_loc_name_ws (name, workspace_id)
    );

    -- backend tables
    CREATE TABLE IF NOT EXISTS boxes (
      id               INT AUTO_INCREMENT PRIMARY KEY,
      name             VARCHAR(255) NOT NULL,
      location         VARCHAR(255),
      code             VARCHAR(10) NOT NULL DEFAULT '' UNIQUE,
      image            VARCHAR(255),
      is_public        TINYINT(1) NOT NULL DEFAULT 0,
      workspace_id     INT,
      last_modified_by VARCHAR(255),
      created_at       DATETIME
    );

    CREATE TABLE IF NOT EXISTS items (
      id               INT AUTO_INCREMENT PRIMARY KEY,
      name             VARCHAR(255) NOT NULL,
      category         VARCHAR(255),
      location         VARCHAR(255),
      code             VARCHAR(10) NOT NULL DEFAULT '' UNIQUE,
      box_id           INT,
      image            VARCHAR(255),
      quantity         INT NOT NULL DEFAULT 1,
      workspace_id     INT,
      last_modified_by VARCHAR(255),
      created_at       DATETIME,
      FOREIGN KEY (box_id) REFERENCES boxes(id)
    );

    CREATE TABLE IF NOT EXISTS tags (
      id      INT AUTO_INCREMENT PRIMARY KEY,
      name    VARCHAR(255) NOT NULL,
      item_id INT NOT NULL,
      FOREIGN KEY (item_id) REFERENCES items(id) ON DELETE CASCADE
    );

    CREATE TABLE IF NOT EXISTS change_logs (
      id            INT AUTO_INCREMENT PRIMARY KEY,
      entity_type   VARCHAR(10) NOT NULL,
      entity_id     INT NOT NULL,
      action        VARCHAR(10) NOT NULL,
      field_changed VARCHAR(255),
      old_value     TEXT,
      new_value     TEXT,
      changed_by    VARCHAR(255) NOT NULL,
      workspace_id  INT NOT NULL,
      created_at    DATETIME
    );

    GRANT SELECT, INSERT, UPDATE, DELETE
    ON warehouse_db.* TO 'warehouse_user'@'%';
    FLUSH PRIVILEGES;