name: CD

on:
  push:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        service: [backend, frontend, auth-service, ai-tagging]
    uses: ./.github/workflows/build-service.yml
    with:
      service: ${{ matrix.service }}
      image-tag: ${{ github.sha }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  update-gitops:
    runs-on: ubuntu-latest
    needs: build
    # Serialize concurrent CD runs so two pushes can't both bump the gitops repo
    # and collide; queue rather than cancel so no tag update is lost.
    concurrency:
      group: gitops-update
      cancel-in-progress: false

    steps:
      - name: Update gitops repo
        env:
          IMAGE_TAG: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git clone https://x-access-token:$GH_TOKEN@github.com/ido273/warehouse-gitops.git
          cd warehouse-gitops
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          for service in backend frontend auth-service ai-tagging; do
            sed -i "s|tag:.*|tag: $IMAGE_TAG|g" envs/production/${service}-values.yaml
          done
          git add .
          git commit -m "ci: update all services to $IMAGE_TAG"
          # Retry against concurrent pushes: rebase on latest and re-push.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $attempt"
              break
            fi
            echo "push rejected, rebasing (attempt $attempt)"
            git pull --rebase origin master
            if [ "$attempt" = "5" ]; then
              echo "failed to push after retries" >&2
              exit 1
            fi
          done
