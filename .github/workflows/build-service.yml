name: Build Service

on:
  workflow_call:
    inputs:
      service:
        description: "Service directory / image name suffix (e.g. backend)"
        required: true
        type: string
      image-tag:
        description: "Docker image tag to push"
        required: true
        type: string
    secrets:
      AWS_OIDC_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push ${{ inputs.service }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t $ECR_REGISTRY/warehouse-${{ inputs.service }}:${{ inputs.image-tag }} \
            --push \
            ./${{ inputs.service }}
