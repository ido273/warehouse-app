<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ text_dir }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Pending — WarehouseMS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --bg: #2b2d42;
      --surface: #1e1e2e;
      --accent: #7c6af7;
      --accent-hover: #6a58e5;
      --accent-glow: rgba(124, 106, 247, 0.35);
      --text: #e0e0f0;
      --muted: #8888aa;
      --border: rgba(124, 106, 247, 0.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .wrap { width: 100%; max-width: 420px; text-align: center; }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 2rem;
      text-decoration: none;
    }
    .icon-wrap {
      width: 80px;
      height: 80px;
      background: rgba(124, 106, 247, 0.14);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--accent);
      margin: 0 auto 1.5rem;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(124,106,247,0.35); }
      50%       { box-shadow: 0 0 0 14px rgba(124,106,247,0); }
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.65rem; }
    p  { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .step-list {
      list-style: none;
      text-align: left;
      background: rgba(124,106,247,0.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .step-list li {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      font-size: 0.85rem;
      color: var(--muted);
      padding: 0.3rem 0;
    }
    .step-list li i { color: var(--accent); width: 16px; text-align: center; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 18px var(--accent-glow);
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      margin-top: 0.6rem;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .lang-toggle {
      position: fixed;
      top: 1rem;
      inset-inline-end: 1rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.3rem 0.6rem;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .lang-toggle i { color: var(--muted); font-size: 0.78rem; }
    .lang-toggle a { color: var(--muted); text-decoration: none; padding: 0.1rem 0.3rem; border-radius: 6px; }
    .lang-toggle a.active { color: var(--accent); cursor: default; }
    .lang-toggle a:not(.active):hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="lang-toggle">
    <i class="fa-solid fa-globe"></i>
    <a href="/set-language/en" class="{{ 'active' if lang == 'en' }}">EN</a>
    /
    <a href="/set-language/he" class="{{ 'active' if lang == 'he' }}">עב</a>
  </div>
  <div class="wrap">
    <a href="/" class="logo">
      <i class="fa-solid fa-warehouse"></i> WarehouseMS
    </a>
    <div class="card">
      <div class="icon-wrap">
        <i class="fa-solid fa-hourglass-half"></i>
      </div>
      <h1>{{ t.pending_title }}</h1>
      <p>{{ t.pending_msg }}</p>
      <ul class="step-list">
        <li><i class="fa-solid fa-check-circle"></i> {{ t.pending_step1 }}</li>
        <li><i class="fa-solid fa-clock"></i> {{ t.pending_step2 }}</li>
        <li><i class="fa-solid fa-arrow-right-to-bracket"></i> {{ t.pending_step3 }}</li>
      </ul>
      <a href="/onboarding" class="btn btn-primary">
        <i class="fa-solid fa-plus"></i> {{ t.join_different_workspace }}
      </a>
      <a href="/logout" class="btn btn-ghost">
        <i class="fa-solid fa-right-from-bracket"></i> {{ t.sign_out_btn }}
      </a>
    </div>
  </div>
<script>
  async function checkApproval() {
    try {
      const r = await fetch('/api/auth/me');
      if (!r.ok) return;
      const data = await r.json();
      if (data.workspaces && data.workspaces.length > 0) {
        window.location.href = '/';
      }
    } catch {}
  }
  setInterval(checkApproval, 10000);
</script>
</body>
</html>
